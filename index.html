<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Електронний каталог будівельних матеріалів</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <h1>Каталог будматеріалів</h1>
    <nav>
        <button onclick="showSection('catalog')">Каталог</button>
        <button onclick="showSection('customers')">Клієнти</button>
        <button onclick="showSection('orders')">Замовлення</button>
        <button onclick="showSection('dictionaries')">Довідники</button>

        <button onclick="runAutomatedTests()" style="background-color: #f39c12;">Тести Ф-1</button>
        <button onclick="runPhase2Tests()" style="background-color: #f39c12;">Тести Ф-2</button>
        <button onclick="runPhase3Tests()" style="background-color: #f39c12;">Тести Ф-3</button>
        <button onclick="runPhase4Tests()" style="background-color: #f39c12;">Тести Ф-4</button>
    </nav>
</header>

<main id="app-content">
    <section id="catalog" class="section active">
        <h2>Каталог товарів</h2>

        <div class="catalog-toolbar">
            <input type="text" id="search-product" placeholder="Пошук за назвою або артикулом..." oninput="renderProducts()">
            <select id="filter-category" onchange="renderProducts()">
                <option value="">Всі категорії</option>
            </select>
        </div>

        <div class="form-container">
            <h3>Додати / Редагувати товар</h3>
            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="product_id">

                <div class="form-row">
                    <input type="text" id="product_name" placeholder="Назва товару*" required>
                    <input type="text" id="product_article" placeholder="Артикул">
                    <input type="number" step="0.01" min="0" id="product_price" placeholder="Ціна*" required>
                </div>

                <div class="form-row">
                    <select id="product_category" required>
                        <option value="">Оберіть категорію*</option>
                    </select>
                    <select id="product_unit" required>
                        <option value="">Одиниці виміру*</option>
                    </select>
                    <input type="text" id="product_image" placeholder="URL зображення">
                </div>

                <div class="form-row">
                    <input type="text" id="product_desc" placeholder="Опис товару" style="flex: 2;">
                    <label class="checkbox-label" style="flex: 1;">
                        <input type="checkbox" id="product_instock" checked> В наявності
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-save">Зберегти товар</button>
                    <button type="button" class="btn-clear" onclick="clearProductForm()">Очистити</button>
                </div>
            </form>
        </div>

        <table class="data-table">
            <thead>
            <tr>
                <th>Фото</th>
                <th>Артикул</th>
                <th>Назва</th>
                <th>Категорія</th>
                <th>Ціна</th>
                <th>Наявність</th>
                <th>Дії</th>
            </tr>
            </thead>
            <tbody id="products-list">
            </tbody>
        </table>
    </section>

    <section id="dictionaries" class="section" style="display: none;">
        <h2>Довідники</h2>
        <div class="dictionaries-container">

            <div class="dict-block">
                <h3>Категорії</h3>
                <form id="category-form" onsubmit="saveCategory(event)">
                    <input type="hidden" id="category_id">
                    <input type="text" id="category_name" placeholder="Назва категорії" required>
                    <input type="text" id="category_desc" placeholder="Опис">
                    <button type="submit" class="btn-save">Зберегти</button>
                    <button type="button" class="btn-clear" onclick="clearCategoryForm()">Очистити</button>
                </form>
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Назва</th>
                        <th>Опис</th>
                        <th>Дії</th>
                    </tr>
                    </thead>
                    <tbody id="categories-list"></tbody>
                </table>
            </div>

            <div class="dict-block">
                <h3>Одиниці виміру</h3>
                <form id="unit-form" onsubmit="saveUnit(event)">
                    <input type="hidden" id="unit_id">
                    <input type="text" id="unit_name" placeholder="Повна назва (напр. Метр квадратний)" required>
                    <input type="text" id="unit_short" placeholder="Скорочення (напр. м²)" required>
                    <button type="submit" class="btn-save">Зберегти</button>
                    <button type="button" class="btn-clear" onclick="clearUnitForm()">Очистити</button>
                </form>
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Назва</th>
                        <th>Скорочення</th>
                        <th>Дії</th>
                    </tr>
                    </thead>
                    <tbody id="units-list"></tbody>
                </table>
            </div>

        </div>
    </section>

    <section id="customers" class="section" style="display: none;">
        <h2>Клієнти</h2>

        <div class="form-container">
            <h3>Додати / Редагувати клієнта</h3>
            <form id="customer-form" onsubmit="saveCustomer(event)">
                <input type="hidden" id="customer_id">

                <div class="form-row">
                    <input type="text" id="customer_name" placeholder="ПІБ клієнта*" required>
                    <input type="text" id="customer_phone" placeholder="Телефон (напр. +380...)">
                </div>

                <div class="form-row">
                    <input type="email" id="customer_email" placeholder="Email">
                    <input type="text" id="customer_address" placeholder="Адреса доставки">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-save">Зберегти клієнта</button>
                    <button type="button" class="btn-clear" onclick="clearCustomerForm()">Очистити</button>
                </div>
            </form>
        </div>

        <table class="data-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>ПІБ</th>
                <th>Телефон</th>
                <th>Email</th>
                <th>Адреса</th>
                <th>Дії</th>
            </tr>
            </thead>
            <tbody id="customers-list">
            </tbody>
        </table>
    </section>

    <section id="orders" class="section" style="display: none;">
        <h2>Замовлення</h2>
        <div id="orders-content">Список замовлень</div>
    </section>
</main>

<script src="lib/sql-wasm.js"></script>
<script src="app.js"></script>
<script src="tests.js"></script>
</body>
</html>
